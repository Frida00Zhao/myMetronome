<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业乐器节拍器</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-sec: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 20px; /* 统一元素间距，防止重叠 */
        }

        /* 1. 顶部拍号选择器 */
        .menu-bar {
            display: flex;
            background: #f2f2f7;
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
        }

        .time-sig-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .time-sig-btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            color: var(--primary-color);
        }

        /* 2. 视觉指示器（节拍点） */
        .indicator-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            height: 24px;
            align-items: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #d2d2d7;
            border-radius: 50%;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dot.active { background: var(--primary-color); transform: scale(1.4); }
        .dot.accent-active { background: #ff9500; transform: scale(1.6); }

        /* 3. 速度显示区域（解决遮挡核心） */
        .bpm-section {
            padding: 10px 0;
        }

        .bpm-display-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        #bpmNumber {
            width: 140px;
            font-size: 4.5rem;
            font-weight: 700;
            border: none;
            text-align: center;
            background: transparent;
            outline: none;
            color: var(--text-main);
            margin: 0;
        }

        /* 移除数字输入框的上下箭头 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .stepper-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f2f2f7;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .stepper-btn:active { background: #e5e5ea; }

        /* 4. 滑动条区域（增加间距） */
        .slider-section {
            padding: 15px 0;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        /* 5. 底部按钮 */
        #startStop {
            background-color: var(--primary-color);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
        }

        #startStop:active { transform: scale(0.98); }
        #startStop.running { background-color: #ff3b30; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu-bar">
        <button class="time-sig-btn" data-beats="2">2/4</button>
        <button class="time-sig-btn" data-beats="3">3/4</button>
        <button class="time-sig-btn active" data-beats="4">4/4</button>
        <button class="time-sig-btn" data-beats="3" data-sub="8">3/8</button>
    </div>

    <div class="indicator-container" id="indicatorContainer"></div>

    <div class="bpm-section">
        <div class="bpm-display-group">
            <button class="stepper-btn" onclick="adjustBPM(-1)">−</button>
            <input type="number" id="bpmNumber" value="120" min="40" max="280">
            <button class="stepper-btn" onclick="adjustBPM(1)">+</button>
        </div>
        <div style="color: var(--text-sec); font-weight: 500;">BPM</div>
    </div>

    <div class="slider-section">
        <input type="range" id="tempoSlider" min="40" max="280" value="120">
    </div>

    <button id="startStop">开始练习</button>
</div>

<script>
    // --- 核心逻辑部分保持不变，仅更新交互绑定 ---
    let audioCtx = null;
    let isRunning = false;
    let tempo = 120;
    let beatsPerMeasure = 4;
    let isEighthNoteBase = false;
    let currentBeat = 0;
    let nextNoteTime = 0.0;
    let timerID = null;

    const startStopBtn = document.getElementById('startStop');
    const tempoSlider = document.getElementById('tempoSlider');
    const bpmNumberInput = document.getElementById('bpmNumber');
    const indicatorContainer = document.getElementById('indicatorContainer');

    function createDots() {
        indicatorContainer.innerHTML = '';
        for (let i = 0; i < beatsPerMeasure; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            indicatorContainer.appendChild(dot);
        }
    }
    createDots();

    function updateTempo(value) {
        tempo = Math.max(40, Math.min(280, value));
        bpmNumberInput.value = tempo;
        tempoSlider.value = tempo;
    }

    window.adjustBPM = (delta) => updateTempo(parseInt(tempo) + delta);
    bpmNumberInput.addEventListener('input', (e) => updateTempo(e.target.value));
    tempoSlider.addEventListener('input', (e) => updateTempo(e.target.value));

    // 音频调度逻辑 (Web Audio API)
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function scheduleNote(beatNumber, time) {
        const osc = audioCtx.createOscillator();
        const envelope = audioCtx.createGain();
        const isFirstBeat = beatNumber % beatsPerMeasure === 0;
        
        osc.frequency.value = isFirstBeat ? 1000 : 800;
        envelope.gain.setValueAtTime(1, time);
        envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.08);

        osc.connect(envelope);
        envelope.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.1);

        setTimeout(() => {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.className = 'dot';
                if (i === beatNumber % beatsPerMeasure) {
                    dot.classList.add('active');
                    if (isFirstBeat) dot.classList.add('accent-active');
                }
            });
        }, (time - audioCtx.currentTime) * 1000);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            scheduleNote(currentBeat, nextNoteTime);
            const multiplier = isEighthNoteBase ? 0.5 : 1.0;
            nextNoteTime += (60.0 / tempo) * multiplier;
            currentBeat = (currentBeat + 1) % beatsPerMeasure;
        }
        timerID = setTimeout(scheduler, 25);
    }

    document.querySelectorAll('.time-sig-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelector('.time-sig-btn.active').classList.remove('active');
            btn.classList.add('active');
            beatsPerMeasure = parseInt(btn.dataset.beats);
            isEighthNoteBase = btn.dataset.sub === "8";
            currentBeat = 0;
            createDots();
        });
    });

    startStopBtn.addEventListener('click', () => {
        initAudio();
        isRunning = !isRunning;
        if (isRunning) {
            currentBeat = 0;
            nextNoteTime = audioCtx.currentTime;
            startStopBtn.textContent = '停止';
            startStopBtn.classList.add('running');
            scheduler();
        } else {
            clearTimeout(timerID);
            startStopBtn.textContent = '开始练习';
            startStopBtn.classList.remove('running');
            document.querySelectorAll('.dot').forEach(d => d.className = 'dot');
        }
    });
</script>
</body>
</html>
